name: Foundation checks

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    env:
      UV_TOOL_BIN_DIR: ${{ runner.temp }}/uv-tools-bin

    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
          submodules: recursive

      - name: Install Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version-file: .bun-version

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@b00af27efadbc7b4ca8b82abbd903b17cc874d2a # v1.9.0
        with:
          version: v1.7.1

      - name: Install uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          version: "0.11.28"

      - name: Install Slither
        run: |
          uv tool install slither-analyzer==0.11.5
          echo "$UV_TOOL_BIN_DIR" >> "$GITHUB_PATH"

      - name: Install Bun dependencies
        working-directory: ops
        run: bun install --frozen-lockfile

      - name: Check Solidity formatting
        run: forge fmt --check

      - name: Check TypeScript formatting
        working-directory: ops
        run: bun run format:check

      - name: Lint TypeScript
        working-directory: ops
        run: bun run lint

      - name: Type-check TypeScript
        working-directory: ops
        run: bun run typecheck

      - name: Test TypeScript
        working-directory: ops
        run: bun test

      - name: Build Solidity
        run: forge build

      - name: Test Solidity
        run: forge test

      - name: Check contract sizes
        run: forge build --sizes

      - name: Run Slither when production Solidity exists
        run: |
          if find src -type f -name '*.sol' -print -quit | grep -q .; then
            slither .
          else
            echo "Slither skipped: no production Solidity source files exist."
          fi
